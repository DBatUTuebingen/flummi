[project]
name = "flummi"
version = "0.1.0"
description = "The Flummi Compile Prototype."
readme = "README.md"
authors = [{ email = "tim.fischer@uni-tuebingen.de" }]
requires-python = ">=3.13"
dependencies = [
    "duckdb>=1.4.1",
    "typer>=0.19.2",
]

[project.scripts]
flummi = "flummi:cli"

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"
